<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Aura Studio Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Aura<span>Studio</span></h2>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="products.html" class="nav-item">
                <i class="fas fa-box"></i>
                <span>Products</span>
            </a>
            <a href="categories.html" class="nav-item active">
                <i class="fas fa-tags"></i>
                <span>Categories</span>
            </a>
            <a href="orders.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Orders</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <a href="../index.html" target="_blank" class="nav-item">
                <i class="fas fa-globe"></i>
                <span>View Website</span>
            </a>
            <button class="nav-item logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="topbar">
            <button class="mobile-sidebar-toggle" id="mobileSidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h1>Categories</h1>
            <div class="topbar-right">
                <div class="admin-profile">
                    <i class="fas fa-user-circle"></i>
                    <span id="adminName">Admin</span>
                </div>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="categories-layout">
                <!-- Add Category Form -->
                <div class="card">
                    <div class="card-header">
                        <h3 id="formTitle">Add New Category</h3>
                    </div>
                    <div class="card-body">
                        <form id="categoryForm" enctype="multipart/form-data">
                            <input type="hidden" id="categoryId">
                            <div class="form-group">
                                <label>Category Name *</label>
                                <input type="text" id="categoryName" required placeholder="Enter category name">
                            </div>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea id="categoryDescription" rows="3" placeholder="Enter description"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Category Image</label>
                                <input type="file" id="categoryImage" accept="image/*">
                                <div id="imagePreview"></div>
                            </div>
                            <div class="form-group">
                                <label class="switch-label">
                                    <input type="checkbox" id="categoryActive" checked>
                                    <span class="switch"></span>
                                    <span>Active</span>
                                </label>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">Cancel</button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Save Category
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Categories List -->
                <div class="card">
                    <div class="card-header">
                        <h3>All Categories</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Image</th>
                                        <th>Name</th>
                                        <th>Description</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="categoriesTable">
                                    <tr>
                                        <td colspan="5" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/admin.js"></script>
    <script>
        let categories = [];
        let editingId = null;
        
        async function loadCategories() {
            const token = localStorage.getItem('admin_token');
            
            try {
                const response = await fetch(`${API_URL}/categories/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                categories = await response.json();
                renderCategories();
                
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }
        
        function renderCategories() {
            const tbody = document.getElementById('categoriesTable');
            
            if (categories.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No categories found</td></tr>';
                return;
            }
            
            tbody.innerHTML = categories.map(cat => `
                <tr>
                    <td>
                        ${cat.image ? `<img src="${cat.image}" alt="${cat.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;">` : '-'}
                    </td>
                    <td><strong>${cat.name}</strong></td>
                    <td>${cat.description || '-'}</td>
                    <td>
                        <span class="badge badge-${cat.isActive ? 'success' : 'danger'}">
                            ${cat.isActive ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button onclick="editCategory('${cat._id}')" class="btn btn-sm btn-info">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteCategory('${cat._id}')" class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        function editCategory(id) {
            const category = categories.find(c => c._id === id);
            if (!category) return;
            
            editingId = id;
            document.getElementById('formTitle').textContent = 'Edit Category';
            document.getElementById('categoryId').value = id;
            document.getElementById('categoryName').value = category.name;
            document.getElementById('categoryDescription').value = category.description || '';
            document.getElementById('categoryActive').checked = category.isActive;
            document.getElementById('cancelBtn').style.display = 'inline-block';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        async function deleteCategory(id) {
            if (!confirm('Are you sure you want to delete this category?')) return;
            
            const token = localStorage.getItem('admin_token');
            
            try {
                const response = await fetch(`${API_URL}/categories/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    alert('Category deleted successfully');
                    loadCategories();
                }
            } catch (error) {
                alert('Error deleting category');
            }
        }
        
        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('categoryName').value);
            formData.append('description', document.getElementById('categoryDescription').value);
            formData.append('isActive', document.getElementById('categoryActive').checked);
            
            const imageFile = document.getElementById('categoryImage').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }
            
            const token = localStorage.getItem('admin_token');
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            try {
                const url = editingId ? `${API_URL}/categories/${editingId}` : `${API_URL}/categories`;
                const method = editingId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                if (response.ok) {
                    alert('Category saved successfully!');
                    resetForm();
                    loadCategories();
                } else {
                    alert('Error saving category');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save Category';
            }
        });
        
        document.getElementById('cancelBtn').addEventListener('click', resetForm);
        
        function resetForm() {
            editingId = null;
            document.getElementById('formTitle').textContent = 'Add New Category';
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('imagePreview').innerHTML = '';
        }
        
        // Image Preview
        document.getElementById('categoryImage').addEventListener('change', function(e) {
            const preview = document.getElementById('imagePreview');
            const file = e.target.files[0];
            
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; margin-top: 10px; border-radius: 4px;">`;
                };
                reader.readAsDataURL(file);
            }
        });
        
        loadCategories();
    </script>
</body>
</html>
